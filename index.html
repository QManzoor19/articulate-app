<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#2ab5b2">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Articulate">
  <meta name="description" content="Think clearly. Write sharply. Improve your clarity, articulation, and communication skills.">
  <title>Articulate — Think Clearly, Write Sharply</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icons/icon.svg">
</head>
<body>
  <div class="app">
    <button class="mobile-nav-toggle" id="mobile-nav-toggle">&#9776;</button>
    <div class="sidebar-backdrop" id="sidebar-backdrop"></div>

    <nav class="sidebar" id="sidebar">
      <div class="sidebar-logo">
        <div style="display:flex;align-items:center;gap:10px;">
          <svg width="32" height="32" viewBox="0 0 512 512" style="flex-shrink:0;">
            <defs>
              <linearGradient id="logo-bg" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:#2ab5b2"/>
                <stop offset="100%" style="stop-color:#2ec4b6"/>
              </linearGradient>
            </defs>
            <rect width="512" height="512" rx="96" fill="url(#logo-bg)"/>
            <g transform="translate(256,256) rotate(-45)">
              <path d="M-20,-140 L20,-140 L12,80 L0,120 L-12,80 Z" fill="#ffffff" opacity="0.95"/>
              <path d="M-12,80 L0,120 L12,80" fill="#ffffff" opacity="0.7"/>
              <rect x="-20" y="-140" width="40" height="30" rx="4" fill="#ffffff" opacity="0.6"/>
            </g>
            <circle cx="370" cy="120" r="8" fill="#ffffff" opacity="0.8"/>
            <circle cx="400" cy="150" r="5" fill="#ffffff" opacity="0.5"/>
            <circle cx="350" cy="155" r="4" fill="#ffffff" opacity="0.4"/>
          </svg>
          <div>
            <h1>Articulate</h1>
            <span>Think clearly. Write sharply.</span>
          </div>
        </div>
      </div>

      <div class="sidebar-nav">
        <div class="nav-section">
          <div class="nav-section-label">Practice</div>
          <a class="nav-item active" data-page="dashboard" href="#dashboard">
            <span class="icon">&#127968;</span> Dashboard
          </a>
          <a class="nav-item" data-page="practice" href="#practice">
            <span class="icon">&#9997;</span> Write
          </a>
          <a class="nav-item" data-page="quick" href="#quick">
            <span class="icon">&#9889;</span> Quick 5-min
          </a>
          <a class="nav-item" data-page="conversation" href="#conversation">
            <span class="icon">&#128172;</span> Conversation
          </a>
          <a class="nav-item" data-page="readlearn" href="#readlearn">
            <span class="icon">&#128214;</span> Read & Learn
          </a>
        </div>

        <div class="nav-section">
          <div class="nav-section-label">Learn</div>
          <a class="nav-item" data-page="course" href="#course">
            <span class="icon">&#127891;</span> Course
          </a>
          <a class="nav-item" data-page="wordbank" href="#wordbank">
            <span class="icon">&#128218;</span> Word Bank
          </a>
          <a class="nav-item" data-page="assessment" href="#assessment">
            <span class="icon">&#128202;</span> Assessment
          </a>
        </div>

        <div class="nav-section">
          <div class="nav-section-label">History</div>
          <a class="nav-item" data-page="archive" href="#archive">
            <span class="icon">&#128196;</span> Archive
          </a>
        </div>
      </div>

      <div class="sidebar-footer">
        <a class="nav-item" data-page="settings" href="#settings">
          <span class="icon">&#9881;</span> Settings
        </a>
        <div style="padding:10px 12px;font-size:12px;color:rgba(255,255,255,0.3);margin-top:8px;">
          Streak: <span id="sidebar-streak" style="color:var(--warning);font-weight:700;">0</span> days
        </div>
      </div>
    </nav>

    <main class="main">
      <div id="page-dashboard" class="page active"></div>
      <div id="page-practice" class="page"></div>
      <div id="page-quick" class="page"></div>
      <div id="page-conversation" class="page"></div>
      <div id="page-course" class="page"></div>
      <div id="page-wordbank" class="page"></div>
      <div id="page-assessment" class="page"></div>
      <div id="page-readlearn" class="page"></div>
      <div id="page-archive" class="page"></div>
      <div id="page-settings" class="page"></div>
    </main>
  </div>

  <script src="js/prompts.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js');
    }
  </script>
</body>
</html>
